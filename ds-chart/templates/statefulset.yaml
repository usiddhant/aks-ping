apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ds
spec:
  serviceName: ds
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: ds
  template:
    metadata:
      labels:
        app: ds
    spec:
        
      
      containers:
        - name: ds
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          command: ["/bin/bash", "-c"]
          args:
            - |
              
              echo "Test0----"
              ls -lrt /opt/opendj/
              echo "Test1----"
              ls -lrt /opt/opendj/data
              echo "Test2----"
              ls -lrt /opt/opendj/data/db
              echo "Test3----"
              ls -lrt /opt/opendj/db
              echo "Test4----"

              echo "PWD"
              pwd
              echo "List /opt/opendj/config"
              ls -lrt  /opt/opendj/config

              cat /opt/opendj/config/keystore.pin

              echo "---->---"

              ls -lrt db 
              ls -lrt changelogDb 
              ls -lrt import-tmp
              ls -lrt locks
              ls -lrt var
              
              # 1. Run your custom profile setup
              ADMIN_PWD=$(cat /opt/opendj/secrets/admin.pwd)
              echo "Running AM CTS profile..."
              ./bin/setup-profile \
                --profile am-cts \
                --set am-cts/tokenExpirationPolicy:am-sessions-only \
                --set am-cts/amCtsAdminPassword:${ADMIN_PWD}

              echo "Running AM Config profile..."
              ./bin/setup-profile \
                --profile am-config \
                --set am-config/amConfigAdminPassword:${ADMIN_PWD}

              echo "Running AM Identity Store profile..."
              ./bin/setup-profile \
                --profile am-identity-store \
                --set am-identity-store/amIdentityStoreAdminPassword:${ADMIN_PWD}

              # 2. Call the original entrypoint script to do the rest
              exec /opt/opendj/docker-entrypoint.sh start-ds

          env:
            - name: DS_SET_UID_ADMIN_AND_MONITOR_PASSWORDS
              value: "true"
            - name: DS_UID_ADMIN_PASSWORD_FILE
              value: /opt/opendj/secrets/admin.pwd
            - name: DS_UID_MONITOR_PASSWORD_FILE
              value: /opt/opendj/secrets/monitor.pwd 

          ports:
            - containerPort: 1389
            - containerPort: 1636
            - containerPort: 4444
            - containerPort: 8989

          volumeMounts:
            - name: data
              mountPath: /opt/opendj/data
            - name: secrets
              mountPath: /opt/opendj/secrets
              readonly: true  

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

      volumes:
        - name: secrets
          secret:
            secretName: ds-secrets  


  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard 
        resources:
          requests:
            storage: {{ .Values.persistence.size }}